name: Release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/apsal-studio/package-lock.json
      - run: python3 -m unittest discover -s tests -v
      - run: python3 scripts/generate_preview_cards.py --check
      - run: python3 scripts/validate_plugin_bundle.py
      - run: python3 scripts/release.py
      - run: npm ci --ignore-scripts
        working-directory: apps/apsal-studio
      - run: npm run build
        working-directory: apps/apsal-studio
      - run: npm test -- --run
        working-directory: apps/apsal-studio
      - run: npm run test:electron
        working-directory: apps/apsal-studio
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/apsal-studio-codex-plugin-${{ github.ref_name }}.zip
            dist/apsal-studio-codex-plugin-${{ github.ref_name }}.zip.sha256
          generate_release_notes: true
