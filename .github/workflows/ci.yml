name: CI
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: python3 -m unittest discover -s tests -v
      - run: python3 scripts/migrate_quiet_window_1_1.py --check
      - run: python3 scripts/generate_semantic_docs.py --check
      - run: python3 scripts/generate_preview_cards.py --check
      - run: python3 scripts/validate_plugin_bundle.py
      - run: python3 plugins/apsal-studio/scripts/apsal.py check-sync examples/quiet-window
      - run: python3 scripts/check_homepage.py
      - run: python3 scripts/check_docs.py
      - run: python3 scripts/release.py --check
      - run: python3 scripts/release.py
      - uses: actions/upload-artifact@v4
        with:
          name: apsal-studio-plugin
          path: dist/*
  studio:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/apsal-studio
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/apsal-studio/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm run build
      - run: npm test -- --run
      - run: npm run test:electron
