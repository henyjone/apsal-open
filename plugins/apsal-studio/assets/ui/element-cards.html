<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    :root { color-scheme:dark; --bg:#101311; --panel:#151916; --text:#eeeade; --muted:#9ba69f; --accent:#8fb3a5; --line:#303a35; --soft:#232b27; }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font:15px/1.55 ui-sans-serif,system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif; }
    main { max-width:1080px; margin:0 auto; padding:20px; }
    header { display:flex; justify-content:space-between; align-items:flex-end; gap:16px; padding-bottom:14px; border-bottom:1px solid var(--soft); }
    h1 { margin:0; font-size:19px; font-weight:620; }
    header p { margin:4px 0 0; color:var(--muted); font-size:13px; }
    .progress { color:var(--accent); font:600 11px/1 ui-monospace,SFMono-Regular,Menlo,monospace; letter-spacing:.1em; text-transform:uppercase; }
    #cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:10px; margin-top:16px; }
    article { padding:16px; border:1px solid var(--line); border-radius:12px; background:var(--panel); }
    .role { color:var(--accent); font:600 10px/1.4 ui-monospace,SFMono-Regular,Menlo,monospace; letter-spacing:.1em; text-transform:uppercase; }
    h2 { margin:5px 0 2px; font-size:16px; }
    .question { color:var(--muted); font-size:12px; }
    .source { display:inline-block; margin-top:10px; padding:3px 7px; border:1px solid #405047; border-radius:999px; color:#b7c2bc; font-size:10px; }
    .intent { margin-top:12px; color:#d9d9d4; }
    section { margin-top:13px; padding-top:11px; border-top:1px solid var(--soft); }
    .label { margin-bottom:6px; color:#7f8a84; font-size:10px; letter-spacing:.1em; text-transform:uppercase; }
    dl { display:grid; grid-template-columns:minmax(90px,.7fr) minmax(0,1.3fr); gap:6px 10px; margin:0; }
    dt { color:var(--muted); font-size:11px; overflow-wrap:anywhere; }
    dd { margin:0; color:#cdd2ce; font-size:12px; overflow-wrap:anywhere; }
    ul { margin:0; padding-left:18px; color:#cdd2ce; font-size:12px; }
    li + li { margin-top:4px; }
    .actions { display:flex; gap:8px; margin-top:13px; }
    button { min-height:44px; flex:1; padding:8px 10px; border:1px solid #58766a; border-radius:8px; background:transparent; color:var(--text); font:inherit; cursor:pointer; touch-action:manipulation; }
    button:hover { border-color:var(--accent); background:#202b26; }
    button:focus-visible { outline:3px solid var(--accent); outline-offset:3px; }
    #confirm { width:100%; margin-top:14px; border-color:var(--accent); }
    @media(max-width:540px) { body{font-size:16px} main{padding:14px} header{align-items:flex-start;flex-direction:column} #cards{grid-template-columns:1fr} dl{grid-template-columns:1fr} }
    @media(prefers-reduced-motion:reduce) { *{scroll-behavior:auto!important} }
  </style>
</head>
<body>
<main>
  <header><div><h1 id="title">APSAL 十三元素</h1><p>逐层确认创作含义、可观察结果与不可改变项。</p></div><div class="progress" id="progress"></div></header>
  <div id="cards"></div>
  <button id="confirm" type="button">确认本层全部元素</button>
</main>
<script>
  const output = window.openai?.toolOutput || {};
  const cards = output.cards || [];
  const safe = value => value == null ? "" : typeof value === "object" ? JSON.stringify(value, null, 0) : String(value);
  const add = (parent, tag, className, value) => { const node=document.createElement(tag); if(className)node.className=className; node.textContent=safe(value); parent.appendChild(node); return node; };
  document.querySelector("#title").textContent = `${safe(output.title)} · ${safe(output.title_en)}`;
  document.querySelector("#progress").textContent = `${safe(output.layer)} · ${cards.length} elements`;
  const host=document.querySelector("#cards");
  cards.forEach(card => {
    const article=document.createElement("article");
    add(article,"div","role",card.role);
    add(article,"h2","",`${safe(card.title)} / ${safe(card.title_en)}`);
    add(article,"div","question",card.question);
    add(article,"span","source",`${safe(card.source)} · ${safe(card.status)}`);
    add(article,"div","intent",card.intent);
    const values=document.createElement("section"); add(values,"div","label","Confirmed values");
    const dl=document.createElement("dl"); Object.entries(card.values || {}).forEach(([key,value])=>{add(dl,"dt","",key);add(dl,"dd","",safe(value));}); values.appendChild(dl); article.appendChild(values);
    const observable=document.createElement("section"); add(observable,"div","label","Observable result");
    const ul=document.createElement("ul"); (card.observable||[]).forEach(value=>add(ul,"li","",value)); observable.appendChild(ul); article.appendChild(observable);
    const preserve=document.createElement("section"); add(preserve,"div","label","Must preserve"); add(preserve,"div","question",(card.must_preserve||[]).join(" · ")); article.appendChild(preserve);
    const actions=document.createElement("div"); actions.className="actions";
    const revise=add(actions,"button","","用自然语言修改此元素"); revise.type="button";
    revise.addEventListener("click",()=>window.openai?.sendFollowUpMessage?.({prompt:`请修改 ${card.role} 元素，先询问我希望改变什么，并说明会影响哪些下游元素。`}));
    article.appendChild(actions); host.appendChild(article);
  });
  document.querySelector("#confirm").addEventListener("click",()=>window.openai?.sendFollowUpMessage?.({prompt:`我确认 ${output.layer} 层的全部元素，请使用当前卡片值提交，并继续下一层。`}));
</script>
</body>
</html>
