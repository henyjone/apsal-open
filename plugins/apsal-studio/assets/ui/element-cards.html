<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    :root { color-scheme:dark; --bg:#080606; --bg-raised:#0d0a08; --panel:#1e1810; --panel-selected:#2a1c0d; --text:#f0e9da; --text-soft:#c9bda2; --muted:#8e8368; --accent:#f5a524; --accent-soft:#f7c873; --accent-deep:#d98a0e; --accent-surface:#2b1e0d; --accent-ink:#211404; --line:#3d3427; --line-strong:#5a4932; --soft:#241d14; --ok:#3ecf7a; }
    * { box-sizing:border-box; }
    body { margin:0; background:radial-gradient(900px 480px at 24% -10%,rgba(247,178,58,.12),transparent 62%),linear-gradient(180deg,var(--bg-raised),var(--bg)); color:var(--text); font:15px/1.55 ui-sans-serif,system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif; }
    main { max-width:1080px; margin:0 auto; padding:20px; }
    header { display:flex; justify-content:space-between; align-items:flex-end; gap:16px; padding-bottom:14px; border-bottom:1px solid var(--soft); }
    h1 { margin:0; color:var(--accent-soft); font-size:20px; font-weight:700; }
    header p { margin:4px 0 0; color:var(--muted); font-size:13px; }
    .progress { color:var(--accent-soft); font:600 11px/1 ui-monospace,SFMono-Regular,Menlo,monospace; letter-spacing:.1em; text-transform:uppercase; }
    .stage-heading { margin:18px 0 8px; color:var(--accent); font-size:11px; font-weight:750; letter-spacing:.08em; }
    #stage-previews { display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:8px; }
    figure.stage { margin:0; min-width:0; padding:7px; border:1px solid var(--line); border-radius:11px; background:#110d09; }
    figure.stage.current { border-color:var(--accent-soft); background:var(--accent-surface); box-shadow:0 0 0 1px rgba(247,200,115,.16); }
    figure.stage.confirmed { border-color:rgba(62,207,122,.52); }
    figure.stage img { display:block; width:100%; max-width:100%; height:auto; aspect-ratio:4/3; border-radius:7px; background:var(--bg); object-fit:contain; }
    figure.stage figcaption { padding:7px 2px 1px; }
    .stage-title { display:block; min-height:30px; color:var(--accent-soft); font-size:11px; font-weight:720; line-height:1.35; overflow-wrap:anywhere; }
    .stage-status { display:block; margin-top:2px; color:var(--muted); font-size:10px; }
    #cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:10px; margin-top:16px; }
    article { position:relative; overflow:hidden; padding:17px; border:1px solid var(--line); border-radius:12px; background:var(--panel); box-shadow:0 18px 42px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,224,160,.04); transition:border-color .18s ease,background .18s ease; }
    article::before { content:""; position:absolute; inset:0 auto 0 0; width:3px; background:var(--accent); opacity:.72; }
    article:hover { border-color:var(--line-strong); background:#241a0f; }
    .role { color:var(--accent); font:700 11px/1.4 ui-sans-serif,system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif; letter-spacing:.06em; }
    h2 { margin:5px 0 2px; color:var(--accent-soft); font-size:17px; font-weight:700; }
    .question { color:var(--muted); font-size:12px; overflow-wrap:anywhere; }
    .source { display:inline-block; margin-top:10px; padding:4px 8px; border:1px solid var(--line-strong); border-radius:999px; background:var(--accent-surface); color:var(--accent-soft); font-size:11px; font-weight:650; }
    .proposal { margin-top:13px; padding:12px 13px; border-left:3px solid var(--accent-soft); background:var(--accent-surface); color:var(--accent-soft); font-weight:680; overflow-wrap:anywhere; }
    .intent,.rationale { color:var(--text-soft); font-weight:520; overflow-wrap:anywhere; }
    .options { display:flex; flex-wrap:wrap; gap:6px; }
    button.option { min-height:44px; flex:0 1 auto; padding:8px 12px; border:1px solid var(--line-strong); border-radius:999px; background:#231a10; color:var(--accent-soft); font-size:12px; font-weight:650; cursor:pointer; touch-action:manipulation; transition:background .18s ease,border-color .18s ease,color .18s ease; }
    button.option:hover { border-color:var(--accent-soft); background:#35230f; color:#fff3d7; }
    button.option:active { background:#442b0d; }
    button.option:focus-visible { outline:3px solid var(--accent); outline-offset:3px; }
    section { margin-top:13px; padding-top:11px; border-top:1px solid var(--soft); }
    .label { margin-bottom:7px; color:var(--accent); font-size:11px; font-weight:700; letter-spacing:.08em; }
    dl { display:grid; grid-template-columns:minmax(90px,.7fr) minmax(0,1.3fr); gap:6px 10px; margin:0; }
    dt { color:var(--muted); font-size:11px; overflow-wrap:anywhere; }
    dd { margin:0; color:var(--accent-soft); font-size:12px; font-weight:650; overflow-wrap:anywhere; }
    ul { margin:0; padding-left:18px; color:var(--text-soft); font-size:12px; overflow-wrap:anywhere; }
    li + li { margin-top:4px; }
    .actions { display:flex; gap:8px; margin-top:13px; }
    button { min-height:44px; flex:1; padding:9px 11px; border:1px solid #7a571f; border-radius:8px; background:transparent; color:var(--accent-soft); font:650 14px/1.4 ui-sans-serif,system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif; cursor:pointer; touch-action:manipulation; transition:background .18s ease,color .18s ease,border-color .18s ease; }
    button:hover { border-color:var(--accent-soft); background:#35230f; }
    button:focus-visible { outline:3px solid var(--accent); outline-offset:3px; }
    #confirm { width:100%; margin-top:14px; border-color:var(--accent-soft); background:var(--accent-soft); color:var(--accent-ink); font-weight:750; }
    #confirm:hover { background:#ffe0a2; color:#180e03; }
    @media(max-width:720px) { #stage-previews{grid-template-columns:repeat(2,minmax(0,1fr))} }
    @media(max-width:540px) { body{font-size:16px} main{padding:14px} header{align-items:flex-start;flex-direction:column} #cards{grid-template-columns:1fr} dl{grid-template-columns:1fr} #stage-previews{grid-template-columns:1fr 1fr} }
    @media(prefers-reduced-motion:reduce) { *{scroll-behavior:auto!important;transition:none!important} }
  </style>
</head>
<body>
<main>
  <header><div><h1 id="title">元素设计</h1><p id="subtitle"></p></div><div class="progress" id="progress"></div></header>
  <div class="stage-heading" id="stage-heading"></div>
  <div id="stage-previews" aria-label=""></div>
  <div id="cards"></div>
  <button id="confirm" type="button"></button>
</main>
<script>
  const output = window.openai?.toolOutput || {};
  const cards = output.cards || [];
  const zh = output.language === "zh-CN";
  document.documentElement.lang = zh ? "zh-CN" : "en";
  const labels = zh ? {
    subtitle:"每张卡片都已填入设计提案、理由、取值、结果与验收标准。", elements:"个元素", proposal:"我的设计提案",
    rationale:"为什么这样建议", options:"可调整方向", purpose:"设计目的", values:"建议取值", stages:"五阶段视觉摘要",
    observable:"应当看到", preserve:"必须保持", qa:"验收标准", revise:"用自然语言修改此元素", confirm:"确认本层全部元素", none:"无"
  } : {
    subtitle:"Every card contains the full proposal, rationale, values, expected result, and acceptance criteria.", elements:"elements", proposal:"My design proposal",
    rationale:"Why this is recommended", options:"Adjustable directions", purpose:"Design purpose", values:"Proposed values", stages:"Five-stage visual summary",
    observable:"Expected result", preserve:"Must preserve", qa:"Acceptance criteria", revise:"Revise this element in natural language", confirm:"Confirm every element in this layer", none:"None"
  };
  const safe = value => {
    if (value == null) return "";
    if (Array.isArray(value)) return value.length ? value.map(safe).join(zh ? "、" : ", ") : labels.none;
    if (typeof value === "object") return Object.entries(value).map(([key,item])=>`${key}${zh ? "：" : ": "}${safe(item)}`).join(" · ");
    return String(value);
  };
  const add = (parent, tag, className, value) => { const node=document.createElement(tag); if(className)node.className=className; node.textContent=safe(value); parent.appendChild(node); return node; };
  document.querySelector("#title").textContent = safe(output.title);
  document.querySelector("#subtitle").textContent = labels.subtitle;
  document.querySelector("#progress").textContent = `${safe(output.layer_label || output.title)} · ${cards.length} ${labels.elements}`;
  document.querySelector("#confirm").textContent = labels.confirm;
  document.querySelector("#stage-heading").textContent = labels.stages;
  const previewHost=document.querySelector("#stage-previews");
  previewHost.setAttribute("aria-label",labels.stages);
  (output.stage_previews||[]).forEach(preview=>{
    const figure=document.createElement("figure"); figure.className=`stage ${preview.current?"current":""} ${preview.status==="confirmed"?"confirmed":""}`;
    const img=document.createElement("img"); img.src=preview.data_uri; img.alt=preview.alt_text; img.width=768; img.height=576; img.loading="lazy"; img.decoding="async"; img.dataset.generationInput=String(preview.generation_input); figure.appendChild(img);
    const caption=document.createElement("figcaption"); add(caption,"span","stage-title",preview.title); add(caption,"span","stage-status",preview.status_label); figure.appendChild(caption); previewHost.appendChild(figure);
  });
  const host=document.querySelector("#cards");
  cards.forEach(card => {
    const article=document.createElement("article");
    add(article,"div","role",card.role_label || card.title);
    add(article,"h2","",safe(card.title));
    add(article,"div","question",card.question);
    add(article,"span","source",`${safe(card.source_label)} · ${safe(card.status_label)}`);
    const proposal=document.createElement("section"); add(proposal,"div","label",labels.proposal); add(proposal,"div","proposal",card.display_recommendation); article.appendChild(proposal);
    const rationale=document.createElement("section"); add(rationale,"div","label",labels.rationale); add(rationale,"div","rationale",card.display_rationale); article.appendChild(rationale);
    const options=document.createElement("section"); add(options,"div","label",labels.options); const optionHost=document.createElement("div"); optionHost.className="options";
    (card.display_options||[]).forEach(value=>{
      const option=add(optionHost,"button","option",value); option.type="button";
      option.setAttribute("aria-label",zh ? `选择${card.title}的方向：${safe(value)}` : `Choose ${safe(value)} for ${card.title}`);
      option.addEventListener("click",()=>window.openai?.sendFollowUpMessage?.({prompt:zh ? `我选择“${safe(value)}”。请按这个方向修改“${card.title}”元素，说明会影响哪些后续元素，然后更新卡片让我确认。` : `I choose “${safe(value)}”. Revise the ${card.role} element in that direction, explain downstream effects, then show the updated card for confirmation.`}));
    });
    options.appendChild(optionHost); article.appendChild(options);
    const purpose=document.createElement("section"); add(purpose,"div","label",labels.purpose); add(purpose,"div","intent",card.display_intent); article.appendChild(purpose);
    const values=document.createElement("section"); add(values,"div","label",labels.values);
    const dl=document.createElement("dl"); Object.entries(card.display_values || {}).forEach(([key,value])=>{add(dl,"dt","",key);add(dl,"dd","",safe(value));}); values.appendChild(dl); article.appendChild(values);
    const observable=document.createElement("section"); add(observable,"div","label",labels.observable);
    const ul=document.createElement("ul"); (card.display_observable||[]).forEach(value=>add(ul,"li","",value)); observable.appendChild(ul); article.appendChild(observable);
    const preserve=document.createElement("section"); add(preserve,"div","label",labels.preserve); add(preserve,"div","question",(card.display_must_preserve||[]).join(" · ")); article.appendChild(preserve);
    const qa=document.createElement("section"); add(qa,"div","label",labels.qa); const qaList=document.createElement("ul"); (card.display_qa_expectations||[]).forEach(value=>add(qaList,"li","",value)); qa.appendChild(qaList); article.appendChild(qa);
    const actions=document.createElement("div"); actions.className="actions";
    const revise=add(actions,"button","",labels.revise); revise.type="button";
    revise.addEventListener("click",()=>window.openai?.sendFollowUpMessage?.({prompt:zh ? `请修改“${card.title}”元素，先询问我希望改变什么，并说明会影响哪些后续元素。` : `Revise the ${card.role} element. First ask what I want to change, then explain which downstream elements will be affected.`}));
    article.appendChild(actions); host.appendChild(article);
  });
  document.querySelector("#confirm").addEventListener("click",()=>window.openai?.sendFollowUpMessage?.({prompt:zh ? `我确认“${output.title}”层的全部元素，请使用当前卡片值提交，并继续下一层。` : `I confirm every element in the ${output.layer} layer. Commit the current card values and continue to the next layer.`}));
</script>
</body>
</html>
