<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    :root {
      color-scheme: dark;
      --bg:#080606;
      --bg-raised:#0d0a08;
      --panel:#1e1810;
      --panel-selected:#2a1c0d;
      --text:#f0e9da;
      --text-soft:#c9bda2;
      --muted:#8e8368;
      --accent:#f5a524;
      --accent-soft:#f7c873;
      --accent-deep:#d98a0e;
      --accent-surface:#2b1e0d;
      --accent-ink:#211404;
      --line:#3d3427;
      --line-strong:#5a4932;
      --soft-line:#241d14;
    }
    * { box-sizing:border-box; }
    body {
      margin:0;
      background:radial-gradient(900px 480px at 24% -10%,rgba(247,178,58,.12),transparent 62%),linear-gradient(180deg,var(--bg-raised),var(--bg));
      color:var(--text);
      font:15px/1.55 ui-sans-serif,system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
    }
    main { max-width:1080px; margin:0 auto; padding:20px; }
    header {
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:18px;
      margin-bottom:16px;
      padding-bottom:14px;
      border-bottom:1px solid var(--soft-line);
    }
    h1 { margin:0; color:var(--accent-soft); font-size:20px; font-weight:700; letter-spacing:.025em; }
    header p { margin:4px 0 0; color:var(--muted); font-size:13px; }
    .stage { color:var(--accent); font:600 11px/1 ui-monospace,SFMono-Regular,Menlo,monospace; letter-spacing:.12em; text-transform:uppercase; }
    #cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(290px,1fr)); gap:10px; }
    article {
      display:flex;
      flex-direction:column;
      min-height:280px;
      padding:16px;
      border:1px solid var(--line);
      border-radius:12px;
      background:var(--panel);
      box-shadow:0 18px 42px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,224,160,.04);
      transition:border-color .15s ease,background .15s ease;
    }
    article:hover { border-color:var(--line-strong); background:#241a0f; }
    article.selected { border-color:var(--accent-soft); background:var(--panel-selected); box-shadow:inset 3px 0 0 var(--accent); }
    .topline { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:12px; }
    .number { color:var(--muted); font:12px/1 ui-monospace,SFMono-Regular,Menlo,monospace; }
    .type {
      padding:4px 8px;
      border:1px solid var(--line-strong);
      border-radius:999px;
      background:var(--accent-surface);
      color:var(--accent-soft);
      font-size:11px;
      font-weight:700;
      letter-spacing:.08em;
      text-transform:uppercase;
    }
    h2 { margin:0; color:var(--accent-soft); font-size:17px; font-weight:720; letter-spacing:.015em; overflow-wrap:anywhere; }
    .reference { margin-top:4px; color:var(--muted); font:11px/1.45 ui-monospace,SFMono-Regular,Menlo,monospace; overflow-wrap:anywhere; }
    .summary { margin:13px 0 0; color:var(--text-soft); font-weight:560; overflow-wrap:anywhere; }
    .section { margin-top:14px; padding-top:12px; border-top:1px solid var(--soft-line); }
    .label { margin-bottom:7px; color:var(--accent); font-size:11px; font-weight:700; letter-spacing:.08em; }
    .attributes { color:var(--accent-soft); font-size:12px; font-weight:620; overflow-wrap:anywhere; }
    .why { padding:9px 11px; border-left:2px solid var(--accent); background:var(--accent-surface); color:var(--text-soft); font-size:12px; font-weight:560; overflow-wrap:anywhere; }
    .tokens { display:flex; flex-wrap:wrap; gap:5px; margin-top:9px; }
    .token { padding:4px 8px; border:1px solid var(--line-strong); border-radius:999px; background:#231a10; color:var(--accent-soft); font:650 11px/1.35 ui-sans-serif,system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif; }
    .footer { margin-top:auto; padding-top:15px; }
    .meta { color:var(--muted); font-size:11px; overflow-wrap:anywhere; }
    button {
      width:100%;
      min-height:44px;
      margin-top:10px;
      padding:9px 11px;
      border:1px solid #7a571f;
      border-radius:8px;
      background:transparent;
      color:var(--accent-soft);
      font:650 14px/1.4 ui-sans-serif,system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
      cursor:pointer;
      touch-action:manipulation;
    }
    button:hover { border-color:var(--accent-soft); background:#35230f; }
    button:focus-visible { outline:3px solid var(--accent); outline-offset:3px; }
    article.selected button { border-color:var(--accent-soft); background:var(--accent-soft); color:var(--accent-ink); font-weight:750; }
    .empty { padding:24px; border:1px solid var(--line); border-radius:12px; color:var(--muted); }
    @media (max-width:540px) {
      main { padding:14px; }
      body { font-size:16px; }
      header { align-items:flex-start; flex-direction:column; }
      #cards { grid-template-columns:1fr; }
    }
    @media (prefers-reduced-motion:reduce) {
      article { transition:none; }
    }
  </style>
</head>
<body>
<main>
  <header>
    <div><h1 id="heading">元素资源库</h1><p id="subtitle"></p></div>
    <div class="stage" id="stage"></div>
  </header>
  <div id="cards"></div>
</main>
<script>
  const output = window.openai?.toolOutput || {};
  const cards = output.cards || output.recommendations || [];
  const stage = output.stage || "DNA";
  const zh = output.language === "zh-CN";
  document.documentElement.lang = zh ? "zh-CN" : "en";
  const labels = zh ? {
    heading:"元素资源库", subtitle:"用文字确认世界构建元素；结构化文件留在后台。", empty:"没有找到匹配的创作资源，请换一种自然语言描述。",
    constraints:"核心约束", why:"匹配原因", choose:"选择此资源", chosen:"已选择", resource:"资源"
  } : {
    heading:"APSAL DNA Registry", subtitle:"Confirm world-building elements with text; images, JSON, and YAML stay in the background.", empty:"No matching DNA was found. Try another natural-language description.",
    constraints:"Core constraints", why:"Why it fits", choose:"Choose this DNA", chosen:"Selected", resource:"resource"
  };
  document.querySelector("#heading").textContent = labels.heading;
  document.querySelector("#subtitle").textContent = labels.subtitle;
  document.querySelector("#stage").textContent = output.stage_label || stage;
  const host = document.querySelector("#cards");

  const text = (value) => value == null ? "" : String(value);
  const appendText = (parent, className, value) => {
    const node = document.createElement("div");
    node.className = className;
    node.textContent = text(value);
    parent.appendChild(node);
    return node;
  };

  if (!cards.length) {
    appendText(host, "empty", labels.empty);
  }

  cards.forEach((card, index) => {
    const item = document.createElement("article");
    const top = document.createElement("div");
    top.className = "topline";
    appendText(top, "number", String(index + 1).padStart(2, "0"));
    appendText(top, "type", card.type_label || card.type);
    item.appendChild(top);

    const title = document.createElement("h2");
    title.textContent = text(card.title);
    item.appendChild(title);

    const ref = card.ref || {};
    appendText(item, "reference", card.reference_label);
    appendText(item, "summary", card.summary);

    const attributes = document.createElement("div");
    attributes.className = "section";
    appendText(attributes, "label", labels.constraints);
    appendText(attributes, "attributes", (card.core_attributes || []).map(text).join(" · "));
    item.appendChild(attributes);

    if (card.reasons?.length) {
      const reason = document.createElement("div");
      reason.className = "section";
      appendText(reason, "label", labels.why);
      appendText(reason, "why", (zh ? card.display_reasons : card.reasons).join(zh ? "；" : "; "));
      const values = zh ? (card.display_tags || []) : [...(card.matched_tags || []), ...(card.matched_facets || [])];
      if (values.length) {
        const tokens = document.createElement("div");
        tokens.className = "tokens";
        values.forEach(value => appendText(tokens, "token", text(value)));
        reason.appendChild(tokens);
      }
      item.appendChild(reason);
    }

    const footer = document.createElement("div");
    footer.className = "footer";
    const rights = card.rights || {};
    appendText(footer, "meta", zh ? `${text(card.rights_label)} · ${text(card.qa_status_label)}` : `${text(rights.license)} · ${text(card.qa_status_label)} · ${text(rights.attribution)}`);
    const button = document.createElement("button");
    button.type = "button";
    button.setAttribute("aria-pressed", "false");
    button.textContent = labels.choose;
    button.addEventListener("click", () => {
      document.querySelectorAll("article.selected").forEach(node => {
        node.classList.remove("selected");
        const otherButton = node.querySelector("button");
        if (otherButton) {
          otherButton.textContent = labels.choose;
          otherButton.setAttribute("aria-pressed", "false");
        }
      });
      item.classList.add("selected");
      button.textContent = labels.chosen;
      button.setAttribute("aria-pressed", "true");
      const prompt = zh ? `我选择第 ${index + 1} 个${text(card.type_label || labels.resource)}，请使用当前卡片对应的内部资源引用继续。` : `I choose ${text(ref.namespace)}/${text(ref.id)}@${text(ref.version)} (${text(ref.type)}, digest ${text(ref.content_digest)}) for the ${stage} stage. Continue.`;
      if (window.openai?.sendFollowUpMessage) window.openai.sendFollowUpMessage({prompt});
    });
    footer.appendChild(button);
    item.appendChild(footer);
    host.appendChild(item);
  });
</script>
</body>
</html>
