<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    :root {
      color-scheme: dark;
      --ink:#101311;
      --panel:#151916;
      --panel-selected:#19211d;
      --ivory:#eeeade;
      --muted:#98a39d;
      --celadon:#8fb3a5;
      --line:#303a35;
      --soft-line:#242c28;
    }
    * { box-sizing:border-box; }
    body {
      margin:0;
      background:var(--ink);
      color:var(--ivory);
      font:15px/1.55 ui-sans-serif,system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
    }
    main { max-width:1080px; margin:0 auto; padding:20px; }
    header {
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:18px;
      margin-bottom:16px;
      padding-bottom:14px;
      border-bottom:1px solid var(--soft-line);
    }
    h1 { margin:0; font-size:18px; font-weight:600; letter-spacing:.025em; }
    header p { margin:4px 0 0; color:var(--muted); font-size:13px; }
    .stage { color:var(--celadon); font:600 11px/1 ui-monospace,SFMono-Regular,Menlo,monospace; letter-spacing:.12em; text-transform:uppercase; }
    #cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(290px,1fr)); gap:10px; }
    article {
      display:flex;
      flex-direction:column;
      min-height:280px;
      padding:16px;
      border:1px solid var(--line);
      border-radius:12px;
      background:var(--panel);
      transition:border-color .15s ease,background .15s ease;
    }
    article:hover { border-color:#577166; }
    article.selected { border-color:var(--celadon); background:var(--panel-selected); }
    .topline { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:12px; }
    .number { color:var(--muted); font:12px/1 ui-monospace,SFMono-Regular,Menlo,monospace; }
    .type {
      padding:4px 8px;
      border:1px solid #405048;
      border-radius:999px;
      color:var(--celadon);
      font-size:10px;
      letter-spacing:.08em;
      text-transform:uppercase;
    }
    h2 { margin:0; font-size:16px; font-weight:620; letter-spacing:.015em; overflow-wrap:anywhere; }
    .reference { margin-top:4px; color:var(--muted); font:11px/1.45 ui-monospace,SFMono-Regular,Menlo,monospace; overflow-wrap:anywhere; }
    .summary { margin:13px 0 0; color:#d7d8d3; }
    .section { margin-top:14px; padding-top:12px; border-top:1px solid var(--soft-line); }
    .label { margin-bottom:6px; color:#7f8b85; font-size:10px; letter-spacing:.1em; text-transform:uppercase; }
    .attributes { color:#c4cac6; font-size:12px; overflow-wrap:anywhere; }
    .why { color:var(--celadon); font-size:12px; }
    .tokens { display:flex; flex-wrap:wrap; gap:5px; margin-top:9px; }
    .token { padding:3px 7px; border-radius:999px; background:#202823; color:#aeb8b2; font:10px/1.35 ui-monospace,SFMono-Regular,Menlo,monospace; }
    .footer { margin-top:auto; padding-top:15px; }
    .meta { color:var(--muted); font-size:11px; overflow-wrap:anywhere; }
    button {
      width:100%;
      min-height:44px;
      margin-top:10px;
      padding:9px 11px;
      border:1px solid #58766a;
      border-radius:8px;
      background:transparent;
      color:var(--ivory);
      font:inherit;
      cursor:pointer;
      touch-action:manipulation;
    }
    button:hover { border-color:var(--celadon); background:#202b26; }
    button:focus-visible { outline:3px solid var(--celadon); outline-offset:3px; }
    article.selected button { border-color:var(--celadon); color:var(--celadon); }
    .empty { padding:24px; border:1px solid var(--line); border-radius:12px; color:var(--muted); }
    @media (max-width:540px) {
      main { padding:14px; }
      body { font-size:16px; }
      header { align-items:flex-start; flex-direction:column; }
      #cards { grid-template-columns:1fr; }
    }
    @media (prefers-reduced-motion:reduce) {
      article { transition:none; }
    }
  </style>
</head>
<body>
<main>
  <header>
    <div><h1>APSAL DNA Registry</h1><p>用文字确认世界构建元素；图片、JSON 与 YAML 留在后台。</p></div>
    <div class="stage" id="stage"></div>
  </header>
  <div id="cards"></div>
</main>
<script>
  const output = window.openai?.toolOutput || {};
  const cards = output.cards || output.recommendations || [];
  const stage = output.stage || "DNA";
  document.querySelector("#stage").textContent = stage;
  const host = document.querySelector("#cards");

  const text = (value) => value == null ? "" : String(value);
  const appendText = (parent, className, value) => {
    const node = document.createElement("div");
    node.className = className;
    node.textContent = text(value);
    parent.appendChild(node);
    return node;
  };

  if (!cards.length) {
    appendText(host, "empty", "没有找到匹配的 DNA。请换一种自然语言描述。");
  }

  cards.forEach((card, index) => {
    const item = document.createElement("article");
    const top = document.createElement("div");
    top.className = "topline";
    appendText(top, "number", String(index + 1).padStart(2, "0"));
    appendText(top, "type", card.type);
    item.appendChild(top);

    const title = document.createElement("h2");
    title.textContent = text(card.title);
    item.appendChild(title);

    const ref = card.ref || {};
    appendText(item, "reference", `${text(ref.namespace)}/${text(ref.id)} · v${text(ref.version)} · ${text(card.scope)}`);
    appendText(item, "summary", card.summary);

    const attributes = document.createElement("div");
    attributes.className = "section";
    appendText(attributes, "label", "Core constraints");
    appendText(attributes, "attributes", (card.core_attributes || []).map(text).join(" · "));
    item.appendChild(attributes);

    if (card.reasons?.length) {
      const reason = document.createElement("div");
      reason.className = "section";
      appendText(reason, "label", "Why it fits");
      appendText(reason, "why", card.reasons.join("；"));
      const values = [...(card.matched_tags || []), ...(card.matched_facets || [])];
      if (values.length) {
        const tokens = document.createElement("div");
        tokens.className = "tokens";
        values.forEach(value => appendText(tokens, "token", text(value)));
        reason.appendChild(tokens);
      }
      item.appendChild(reason);
    }

    const footer = document.createElement("div");
    footer.className = "footer";
    const rights = card.rights || {};
    appendText(footer, "meta", `${text(rights.license)} · ${text(card.qa_status)} · ${text(rights.attribution)}`);
    const button = document.createElement("button");
    button.type = "button";
    button.setAttribute("aria-pressed", "false");
    button.textContent = "选择此 DNA";
    button.addEventListener("click", () => {
      document.querySelectorAll("article.selected").forEach(node => {
        node.classList.remove("selected");
        const otherButton = node.querySelector("button");
        if (otherButton) {
          otherButton.textContent = "选择此 DNA";
          otherButton.setAttribute("aria-pressed", "false");
        }
      });
      item.classList.add("selected");
      button.textContent = "已选择";
      button.setAttribute("aria-pressed", "true");
      const prompt = `我选择 ${text(ref.namespace)}/${text(ref.id)}@${text(ref.version)}（${text(ref.type)}，摘要 ${text(ref.content_digest)}）用于 ${stage} 阶段，请继续。`;
      if (window.openai?.sendFollowUpMessage) window.openai.sendFollowUpMessage({prompt});
    });
    footer.appendChild(button);
    item.appendChild(footer);
    host.appendChild(item);
  });
</script>
</body>
</html>
